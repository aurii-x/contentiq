name: Build and Deploy ContentIQ

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Inject real deploy timestamp into the landing page
        run: |
          BUILD_TIME=$(TZ="America/New_York" date "+%B %-d, %Y at %-I:%M %p %Z")
          sed -i "s/__BUILD_TIME__/${BUILD_TIME}/" src/index.html

      - name: Build site with Eleventy
        run: npx @11ty/eleventy

      - name: Upload build output
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
